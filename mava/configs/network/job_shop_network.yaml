# mava/configs/network/job_shop_network.yaml
_name_: job_shop_network
defaults:
  - _self_
# ───────────────────────────────────────────────────────────────────────────────
# --- Transformer Network for JobShop ------------------------------------------
num_layers: 1
embed_dim: 64
num_heads: 1
use_swiglu: False

# --- Actor network ------------------------------------------------------------
actor_network:
  _target_: mava.networks.job_shop_network.JobShopActor      # ← ADD THIS
  pre_torso:
    _target_: mava.networks.torsos.TransformerTorso
    num_layers: ${network.num_layers}
    embed_dim:  ${network.embed_dim}
    num_heads:  ${network.num_heads}
    input_dim:  128
    use_swiglu: ${network.use_swiglu}
  post_torso:
    _target_: mava.networks.torsos.MLPTorso
    layer_sizes: [128]
    use_layer_norm: False
    activation: relu

# --- Critic network -----------------------------------------------------------
critic_network:
  _target_: mava.networks.job_shop_network.JobShopCritic     # ← ADD THIS
  pre_torso:
    _target_: mava.networks.torsos.TransformerTorso
    num_layers: ${network.num_layers}
    embed_dim:  ${network.embed_dim}
    num_heads:  ${network.num_heads}
    input_dim:  128
    use_swiglu: ${network.use_swiglu}
  post_torso:
    _target_: mava.networks.torsos.MLPTorso
    layer_sizes: [128]
    use_layer_norm: False
    activation: relu

# --- Q-network (only needed for algorithms that use it) -----------------------
q_network:
  pre_torso:
    _target_: mava.networks.torsos.TransformerTorso
    num_layers: ${network.num_layers}
    embed_dim:  ${network.embed_dim}
    num_heads:  ${network.num_heads}
    input_dim:  128
    use_swiglu: ${network.use_swiglu}
  post_torso:
    _target_: mava.networks.torsos.MLPTorso
    layer_sizes: [128]
    use_layer_norm: False
    activation: relu