# --- Transformer Network for JobShop ---
n_block: 1  # Number of transformer blocks
embed_dim: 64  # Embedding dimension for transformer
n_head: 1  # Number of attention heads
use_rmsnorm: False  # Use RMSNorm instead of LayerNorm
use_swiglu: False  # Use SwiGLU instead of standard MLP in feedforward networks

# --- Actor Network Configuration ---
actor_network:
  pre_torso:
    _target_: mava.networks.torsos.TransformerTorso
    n_block: ${network.n_block}
    embed_dim: ${network.embed_dim}
    n_head: ${network.n_head}
    use_rmsnorm: ${network.use_rmsnorm}
    use_swiglu: ${network.use_swiglu}
  post_torso:
    _target_: mava.networks.torsos.MLPTorso
    layer_sizes: [128]
    use_layer_norm: False
    activation: relu

# --- Critic Network Configuration ---
critic_network:
  pre_torso:
    _target_: mava.networks.torsos.TransformerTorso
    n_block: ${network.n_block}
    embed_dim: ${network.embed_dim}
    n_head: ${network.n_head}
    use_rmsnorm: ${network.use_rmsnorm}
    use_swiglu: ${network.use_swiglu}
  post_torso:
    _target_: mava.networks.torsos.MLPTorso
    layer_sizes: [128]
    use_layer_norm: False
    activation: relu

# --- Q-Network Configuration (Optional) ---
q_network:
  pre_torso:
    _target_: mava.networks.torsos.TransformerTorso
    n_block: ${network.n_block}
    embed_dim: ${network.embed_dim}
    n_head: ${network.n_head}
    use_rmsnorm: ${network.use_rmsnorm}
    use_swiglu: ${network.use_swiglu}
  post_torso:
    _target_: mava.networks.torsos.MLPTorso
    layer_sizes: [128]
    use_layer_norm: False
    activation: relu