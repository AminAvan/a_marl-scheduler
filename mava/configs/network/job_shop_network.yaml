# --- Transformer Network for JobShop ---
num_layers: 1  # Number of transformer layers (was n_block)
embed_dim: 64  # Embedding dimension for transformer
num_heads: 1   # Number of attention heads (was n_head)
use_swiglu: False  # Use SwiGLU instead of standard MLP in feedforward networks

# --- Actor Network Configuration ---
actor_network:
  pre_torso:
    _target_: mava.networks.torsos.TransformerTorso
    num_layers: ${num_layers}
    embed_dim: ${embed_dim}
    num_heads: ${num_heads}
    input_dim: 128  # Added required parameter (adjust to environment input size)
    use_swiglu: ${use_swiglu}
  post_torso:
    _target_: mava.networks.torsos.MLPTorso
    layer_sizes: [128]
    use_layer_norm: False
    activation: relu

# --- Critic Network Configuration ---
critic_network:
  pre_torso:
    _target_: mava.networks.torsos.TransformerTorso
    num_layers: ${num_layers}
    embed_dim: ${embed_dim}
    num_heads: ${num_heads}
    input_dim: 128  # Added required parameter (adjust to environment input size)
    use_swiglu: ${use_swiglu}
  post_torso:
    _target_: mava.networks.torsos.MLPTorso
    layer_sizes: [128]
    use_layer_norm: False
    activation: relu

# --- Q-Network Configuration (Optional) ---
q_network:
  pre_torso:
    _target_: mava.networks.torsos.TransformerTorso
    num_layers: ${num_layers}
    embed_dim: ${embed_dim}
    num_heads: ${num_heads}
    input_dim: 128  # Added required parameter (adjust to environment input size)
    use_swiglu: ${use_swiglu}
  post_torso:
    _target_: mava.networks.torsos.MLPTorso
    layer_sizes: [128]
    use_layer_norm: False
    activation: relu